# Storage type: sqlite or mysql
storage-type: sqlite

sqlite:
  file: simplesql.db

mysql:
  host: localhost
  port: 3306
  database: minecraft
  username: root
  password: change-me
  use-ssl: false

pool:
  maximum-pool-size: 10
  minimum-idle: 2
  # Connection timeout is fixed at 3000 ms in code by request.
  connection-timeout-ms: 3000

